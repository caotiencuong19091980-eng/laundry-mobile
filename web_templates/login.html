{% extends "base.html" %}
{% block title %}Đăng nhập hệ thống{% endblock %}
{% block content %}
<section class="card auth-card">
  <h2>Đăng nhập hệ thống</h2>
  <form method="post" action="{{ url_for('login') }}" class="auth-form">
    <label>Tên đăng nhập
      <input name="username" required autocomplete="username" />
    </label>
    <label>Mật khẩu
      <input type="password" name="password" required autocomplete="current-password" />
    </label>
    <label class="remember-row">
      <input type="checkbox" name="remember" />
      <span>Ghi nhớ mật khẩu</span>
    </label>
    <button type="submit" class="btn-primary">Đăng nhập</button>
  </form>
  <div class="forgot-box">
    <p><b>Quên mật khẩu?</b></p>
    <p>Gửi tin nhắn đến số <b>{{ sms_number }}</b> để lấy lại mật khẩu.</p>
    <a class="btn-link" href="sms:{{ sms_number }}?body=Toi quen mat khau he thong giat la, vui long ho tro lay lai.">Gửi SMS lấy lại mật khẩu</a>
  </div>
  <p class="hint">Tài khoản mặc định lần đầu: <b>admin / 123456</b></p>
</section>
{% endblock %}
