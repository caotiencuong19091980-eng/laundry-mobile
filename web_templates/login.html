{% extends "base.html" %}
{% block title %}Đăng nhập hệ thống{% endblock %}
{% block content %}
<section class="card auth-card">
  <h2>Đăng nhập hệ thống</h2>
  <form method="post" action="{{ url_for('login') }}" class="auth-form">
    <label>Tên đăng nhập
      <input name="username" required autocomplete="username" />
    </label>
    <label>Mật khẩu
      <input type="password" name="password" required autocomplete="current-password" />
    </label>
    <label class="remember-row">
      <input type="checkbox" name="remember" />
      <span>Ghi nhớ mật khẩu</span>
    </label>
    <button type="submit" class="btn-primary">Đăng nhập</button>
  </form>
  <div class="forgot-box">
    <p><b>Đổi mật khẩu</b></p>
    <form method="post" action="{{ url_for('change_password_login') }}" class="auth-form">
      <label>Tên đăng nhập
        <input name="username" required />
      </label>
      <label>Mật khẩu hiện tại
        <input type="password" name="current_password" required />
      </label>
      <label>Mật khẩu mới
        <input type="password" name="new_password" required />
      </label>
      <label>Xác nhận mật khẩu mới
        <input type="password" name="confirm_password" required />
      </label>
      <button type="submit" class="btn-primary">Đổi mật khẩu</button>
    </form>
  </div>
  <div class="forgot-box">
    <p><b>Quên mật khẩu? Đặt lại bằng mã khôi phục</b></p>
    <form method="post" action="{{ url_for('forgot_password') }}" class="auth-form">
      <label>Tên đăng nhập
        <input name="username" required />
      </label>
      <label>Mã khôi phục
        <input name="reset_code" required />
      </label>
      <label>Mật khẩu mới
        <input type="password" name="new_password" required />
      </label>
      <label>Xác nhận mật khẩu mới
        <input type="password" name="confirm_password" required />
      </label>
      <button type="submit" class="btn-primary">Đặt lại mật khẩu</button>
    </form>
  </div>
</section>
{% endblock %}
